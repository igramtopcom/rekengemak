<!DOCTYPE html>
<html lang="nl">
<head>
  <script>
    (function() {
      var t = localStorage.getItem('rekengemak-theme');
      document.documentElement.setAttribute('data-theme', t || 'dark');
    })();
  </script>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Contact - RekenGemak</title>
  <meta name="description" content="Neem contact op met RekenGemak. Vragen, suggesties of feedback? Stuur ons een bericht.">
  <link rel="canonical" href="https://rekengemak.nl/contact/">
  <style>
    :root,
    [data-theme="dark"] {
      --bg-primary: #0D1117;
      --bg-card: #161B22;
      --bg-input: #21262D;
      --border: #30363D;
      --accent: #1F5C99;
      --accent-hover: #2272C3;
      --success: #2EA043;
      --text-primary: #E6EDF3;
      --text-secondary: #8B949E;
      --space-sm: 8px;
      --space-md: 16px;
      --space-lg: 24px;
      --space-xl: 32px;
      --radius: 10px;
      --transition: 0.15s ease;
    }
    [data-theme="light"] {
      --bg-primary: #F6F8FA;
      --bg-card: #FFFFFF;
      --bg-input: #F0F3F6;
      --border: #D0D7DE;
      --text-primary: #1F2328;
      --text-secondary: #636C76;
    }
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: system-ui, -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      background: var(--bg-primary);
      color: var(--text-primary);
      line-height: 1.6;
      min-height: 100vh;
    }
    header {
      position: sticky; top: 0; z-index: 100; height: 56px;
      background: var(--bg-card); border-bottom: 1px solid var(--border);
      backdrop-filter: blur(8px); display: flex; align-items: center;
      justify-content: space-between; padding: 0 var(--space-lg);
    }
    .logo { font-size: 1.25rem; font-weight: 700; color: var(--text-primary); text-decoration: none; }
    .theme-toggle {
      background: none; border: 1px solid var(--border); border-radius: 8px;
      color: var(--text-secondary); cursor: pointer; width: 40px; height: 40px;
      display: flex; align-items: center; justify-content: center; font-size: 1.2rem;
      transition: border-color var(--transition);
    }
    .theme-toggle:hover { border-color: var(--accent); }
    main { max-width: 680px; margin: 0 auto; padding: var(--space-xl) var(--space-md); }
    h1 { font-size: clamp(1.4rem, 3vw, 1.8rem); font-weight: 700; margin-bottom: var(--space-md); }
    p { color: var(--text-secondary); margin-bottom: var(--space-md); }
    a { color: var(--accent); }
    footer {
      background: var(--bg-card); border-top: 1px solid var(--border);
      padding: var(--space-lg); margin-top: var(--space-xl); text-align: center;
      font-size: 0.8rem; color: var(--text-secondary);
    }
    footer a { color: var(--text-secondary); text-decoration: none; }
    footer a:hover { color: var(--accent); }
  </style>
</head>
<body>
  <header>
    <a href="/" class="logo">RekenGemak</a>
    <button class="theme-toggle" onclick="toggleTheme()" aria-label="Wissel thema">
      <span id="theme-icon">&#9789;</span>
    </button>
  </header>
  <main>
    <h1>Contact</h1>
    <p>Heb je een vraag, suggestie of heb je een fout gevonden? Neem gerust contact met ons op via e-mail:</p>
    <p><a href="mailto:info@rekengemak.nl">info@rekengemak.nl</a></p>
    <p>We proberen binnen 2 werkdagen te reageren.</p>
  </main>
  <footer>
    <p>&copy; 2026 RekenGemak &middot; <a href="/privacy/">Privacy beleid</a> &middot; <a href="/contact/">Contact</a></p>
  </footer>
  <script>
    function toggleTheme() {
      var current = document.documentElement.getAttribute('data-theme');
      var next = current === 'dark' ? 'light' : 'dark';
      document.documentElement.setAttribute('data-theme', next);
      localStorage.setItem('rekengemak-theme', next);
      document.getElementById('theme-icon').innerHTML = next === 'dark' ? '&#9789;' : '&#9788;';
    }
    (function() {
      var theme = document.documentElement.getAttribute('data-theme');
      document.getElementById('theme-icon').innerHTML = theme === 'dark' ? '&#9789;' : '&#9788;';
    })();
  </script>
</body>
</html>
